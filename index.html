<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PEP 词汇学习</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f7fbff;
        color: #0f172a;
      }

      .boot-panel {
        max-width: 720px;
        margin: 10vh auto;
        padding: 24px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px -48px rgba(15, 23, 42, 0.35);
      }

      .boot-panel h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .boot-panel p {
        margin: 0 0 12px;
        line-height: 1.8;
        color: #475569;
      }

      .boot-panel code {
        padding: 2px 8px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .boot-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
      }

      .boot-links a {
        color: #0f172a;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="boot-panel">
        <h1>PEP 词汇学习</h1>
        <p>如果你现在看到的是这个说明，而不是词汇页面，说明你打开的是源码入口而不是正在运行的前端服务。</p>
        <p>开发模式请在项目根目录运行 <code>pnpm dev</code>，然后访问 <code>http://localhost:3000</code>。</p>
        <p>如果你只是想直接打开成品文件，请先执行 <code>pnpm build</code>，再打开 <code>dist/public/index.html</code>。</p>
        <div class="boot-links">
          <a href="./dist/public/index.html">打开构建版本</a>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
