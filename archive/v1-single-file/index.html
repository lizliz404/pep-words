<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人教版 PEP 小学英语单词汇总（3-6年级）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --secondary: #7c3aed;
    --accent: #059669;
    --bg: #f0f4ff;
    --card: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #7c3aed 100%);
    color: white;
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60%;
    right: -20%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40%;
    left: -10%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .header-emoji { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .header h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }
  .header-subtitle {
    margin-top: 8px;
    font-size: 0.95rem;
    opacity: 0.8;
    position: relative;
    z-index: 1;
  }
  .header-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }
  .header-stats {
    display: flex;
    justify-content: center;
    gap: clamp(20px, 5vw, 48px);
    margin-top: 28px;
    position: relative;
    z-index: 1;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.8));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 0.75rem;
    opacity: 0.75;
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Container */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* Search bar */
  .search-bar {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafafa;
  }
  .search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: white;
  }
  .filter-select {
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
    background: white;
    cursor: pointer;
    transition: border-color 0.2s;
    color: var(--text);
  }
  .filter-select:focus { border-color: var(--primary); }
  .search-count {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Charts */
  .charts-row {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) {
    .charts-row { grid-template-columns: 1fr; }
  }
  .chart-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .chart-card-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; height: 220px; }

  /* Grade tabs */
  .grade-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .grade-tab {
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: white;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
  }
  .grade-tab:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .grade-tab.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 3px 10px rgba(37,99,235,0.3);
  }

  /* Words section */
  .words-section {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .words-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    background: #fafbff;
  }
  .words-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  .unit-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .unit-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
    font-weight: 500;
  }
  .unit-pill:hover { border-color: var(--primary); color: var(--primary); }
  .unit-pill.active {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
  }

  /* Word grid */
  .words-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .word-card {
    background: white;
    padding: 14px 16px;
    transition: background 0.15s, transform 0.1s;
    position: relative;
  }
  .word-card:hover {
    background: #f8faff;
    z-index: 1;
  }
  .word-card.highlight { background: #fffbeb; }
  .word-card.highlight:hover { background: #fef3c7; }
  .word-en {
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 3px;
    word-break: break-word;
  }
  .word-ph {
    font-size: 0.72rem;
    color: #94a3b8;
    font-family: 'Courier New', monospace;
    margin-bottom: 6px;
    min-height: 14px;
  }
  .word-cn {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 500;
  }
  .word-meta {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .word-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 8px;
    font-size: 0.68rem;
    font-weight: 600;
    background: var(--primary-light);
    color: var(--primary);
  }
  .word-tag-unit {
    background: #f0fdf4;
    color: #16a34a;
  }

  /* No results */
  .no-results {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
  }
  .no-results-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

  /* Footer */
  footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 0.82rem;
    line-height: 1.8;
  }

  @media (max-width: 480px) {
    .words-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .header-stats { gap: 16px; }
  }
</style>
</head>

  <div class="words-section">

</div>

<footer>
  <p>数据来源：人教版 PEP 小学英语教材（2024/2025 修订版）</p>
  <p>三年级至六年级 · 共 837 个单词 · 46 个单元</p>
</footer>

const gradeColors = [
  '#3b82f6','#8b5cf6','#ec4899','#f59e0b',
  '#10b981','#ef4444','#06b6d4','#84cc16'
];

// Flatten all words
let allWords = [];
DATA.forEach(g => {
  g.units.forEach(u => {
    u.words.forEach(w => {
      allWords.push({
        word: w.word || '',
        phonetic: w.phonetic || '',
        meaning: w.meaning || '',
        grade: g.grade,
        unit: u.unit
      });
    });
  });
});

// Bar chart
const barCtx = document.getElementById('barChart').getContext('2d');
new Chart(barCtx, {
  type: 'bar',
  data: {
    labels: DATA.map(d => d.grade.replace('年级', '年').replace('上册','上').replace('下册','下')),
    datasets: [{
      label: '单词数',
      data: DATA.map(d => d.units.reduce((s, u) => s + u.words.length, 0)),
      backgroundColor: gradeColors,
      borderRadius: 8,
      borderSkipped: false
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: c => ` ${c.parsed.y} 个单词` } }
    },
    scales: {
      y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } },
      x: { grid: { display: false }, ticks: { font: { size: 10 } } }
    }
  }
});

// Pie chart
const upper = ['三年级上册','四年级上册','五年级上册','六年级上册'];
const lower = ['三年级下册','四年级下册','五年级下册','六年级下册'];
const countFn = grades => DATA.filter(d => grades.includes(d.grade))
  .reduce((s, d) => s + d.units.reduce((ss, u) => ss + u.words.length, 0), 0);

const pieCtx = document.getElementById('pieChart').getContext('2d');
new Chart(pieCtx, {
  type: 'doughnut',
  data: {
    labels: ['上册合计', '下册合计'],
    datasets: [{
      data: [countFn(upper), countFn(lower)],
      backgroundColor: ['#3b82f6', '#8b5cf6'],
      borderWidth: 0,
      hoverOffset: 10
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 16 } },
      tooltip: { callbacks: { label: c => ` ${c.label}: ${c.parsed} 个单词` } }
    },
    cutout: '62%'
  }
});

// State
let curGrade = 'all', curUnit = 'all', query = '';

function renderWords() {
  let list = allWords;
  if (curGrade !== 'all') list = list.filter(w => w.grade === curGrade);
  if (curUnit !== 'all') list = list.filter(w => w.unit === curUnit);
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q));
  }

  document.getElementById('searchCount').textContent = `共 ${list.length} 个单词`;
  const grid = document.getElementById('wordsGrid');
  const noRes = document.getElementById('noResults');

  if (list.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  const hl = query.toLowerCase();
  grid.innerHTML = list.map(w => {
    const isHl = hl && (w.word.toLowerCase().includes(hl) || w.meaning.includes(hl));
    return `<div class="word-card${isHl ? ' highlight' : ''}">
      <div class="word-en">${w.word}</div>
      <div class="word-ph">${w.phonetic}</div>
      <div class="word-cn">${w.meaning}</div>
      <div class="word-meta">
        <span class="word-tag">${w.grade}</span>
        <span class="word-tag word-tag-unit">${w.unit}</span>
      </div>
    </div>`;
  }).join('');
}

function renderUnitPills() {
  const pills = document.getElementById('unitPills');
  if (curGrade === 'all') { pills.innerHTML = ''; return; }
  const gd = DATA.find(d => d.grade === curGrade);
  if (!gd) return;
  pills.innerHTML = `<button class="unit-pill${curUnit==='all'?' active':''}" data-unit="all">全部</button>` +
    gd.units.map(u => `<button class="unit-pill${curUnit===u.unit?' active':''}" data-unit="${u.unit}">${u.unit}</button>`).join('');
  pills.querySelectorAll('.unit-pill').forEach(b => b.addEventListener('click', () => {
    curUnit = b.dataset.unit;
    renderUnitPills();
    renderWords();
  }));
}

document.getElementById('gradeTabs').addEventListener('click', e => {
  const t = e.target.closest('.grade-tab');
  if (!t) return;
  document.querySelectorAll('.grade-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  curGrade = t.dataset.grade;
  curUnit = 'all';
  document.getElementById('sectionTitle').textContent = curGrade === 'all' ? '全部单词' : curGrade + ' 单词表';
  renderUnitPills();
  renderWords();
});

document.getElementById('gradeFilter').addEventListener('change', e => {
  curGrade = e.target.value || 'all';
  curUnit = 'all';
  document.querySelectorAll('.grade-tab').forEach(t => t.classList.toggle('active', t.dataset.grade === curGrade));
  document.getElementById('sectionTitle').textContent = curGrade === 'all' ? '全部单词' : curGrade + ' 单词表';
  renderUnitPills();
  renderWords();
});

document.getElementById('searchInput').addEventListener('input', e => {
  query = e.target.value.trim();
  renderWords();
});

renderWords();
</script>
